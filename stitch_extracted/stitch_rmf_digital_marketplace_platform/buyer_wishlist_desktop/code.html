    <script>
        // Micro-interaction: Removal Animation
        document.querySelectorAll('button').forEach(btn => {
            if (btn.innerText.includes('Remove')) {
                btn.addEventListener('click', function() {
                    const card = this.closest('.ghost-border');
                    card.style.transition = 'all 0.4s ease';
                    card.style.opacity = '0';
                    card.style.transform = 'scale(0.9) translateY(20px)';
                    setTimeout(() => {
                        card.remove();
                    }, 400);
                });
            }
            if (btn.innerText.includes('Add')) {
                btn.addEventListener('click', function() {
                    const originalText = this.innerHTML;
                    this.innerHTML = `<span class="material-symbols-outlined text-[18px]" data-icon="check">check</span> Added`;
                    this.classList.replace('bg-primary', 'bg-green-600');
                    setTimeout(() => {
                        this.innerHTML = originalText;
                        this.classList.replace('bg-green-600', 'bg-primary');
                    }, 2000);
                });
            }
        });
    </script>
