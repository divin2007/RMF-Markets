services:
  - type: web
    name: rmf-user-service
    runtime: node
    plan: starter
    buildCommand: bash ./build.sh user-service
    startCommand: bash ./start.sh user-service
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_SERVICE_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "https://www.rwshop.org,https://rwshop.org,https://rmf-frontend.onrender.com"
      - key: FRONTEND_URL
        value: "https://www.rwshop.org"
      - key: NOTIFICATION_SERVICE_URL
        value: "https://rmf-notification-service.onrender.com/api/v1"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: "https://rmf-user-service.onrender.com/api/v1/auth/google/callback"

