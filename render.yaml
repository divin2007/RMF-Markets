        value: "https://payments.paypack.rw/api"
      - key: PAYPACK_WEBHOOK_MODE
        value: production
      - key: PAYPACK_WEBHOOK_SECRET
        sync: false
      - key: PAYPACK_AUTO_CONFIRM
        value: "false"
      - key: PAYPACK_PLATFORM_PHONE
        sync: false
      - key: ALLOW_LEGACY_PAYMENT_GATEWAYS
        value: "false"
      - key: MTN_MOMO_API_KEY
        sync: false
      - key: MTN_MOMO_USER_ID
        sync: false
      - key: MTN_MOMO_API_SECRET
        sync: false
      - key: MTN_MOMO_TARGET_ENV
        value: mtnrwanda
      - key: AIRTEL_MONEY_API_KEY
        sync: false
      - key: AIRTEL_MONEY_SECRET
        sync: false
      - key: AIRTEL_MONEY_TARGET_ENV
        value: production
      - key: FRAUD_HIGH_VALUE_THRESHOLD
        value: "2000000"
      - key: DELIVERY_FEE_PER_5KM
        value: "500"
      - key: AUTO_CONFIRM_PAYMENTS
